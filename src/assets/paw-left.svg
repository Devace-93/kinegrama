<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 178">
  <!-- Cat paw reaching down from above, toes curled as if gripping a sheet edge.
       Outline trick: stroked silhouette first, then the same shapes fill-only on top. -->
  <g stroke="#7c4a1e" stroke-width="6" fill="#f5a962" stroke-linejoin="round">
    <rect x="38" y="-12" width="44" height="112" rx="20"/>
    <ellipse cx="60" cy="120" rx="41" ry="37"/>
    <circle cx="33" cy="147" r="15"/>
    <circle cx="60" cy="153" r="15"/>
    <circle cx="87" cy="147" r="15"/>
  </g>
  <g fill="#f5a962">
    <rect x="38" y="-12" width="44" height="112" rx="20"/>
    <ellipse cx="60" cy="120" rx="41" ry="37"/>
    <circle cx="33" cy="147" r="15"/>
    <circle cx="60" cy="153" r="15"/>
    <circle cx="87" cy="147" r="15"/>
  </g>
  <!-- toe separations -->
  <path d="M 46 162 Q 45 153 46 147" fill="none" stroke="#7c4a1e" stroke-width="4" stroke-linecap="round"/>
  <path d="M 74 162 Q 73 153 74 147" fill="none" stroke="#7c4a1e" stroke-width="4" stroke-linecap="round"/>
  <!-- tabby stripes on the arm -->
  <path d="M 42 16 Q 60 23 78 16" fill="none" stroke="#d9843b" stroke-width="5" stroke-linecap="round"/>
  <path d="M 42 38 Q 60 45 78 38" fill="none" stroke="#d9843b" stroke-width="5" stroke-linecap="round"/>
  <path d="M 42 60 Q 60 68 78 60" fill="none" stroke="#d9843b" stroke-width="5" stroke-linecap="round"/>
</svg>
